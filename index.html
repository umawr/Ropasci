<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Honk:MORF@15&family=Nabla&display=swap"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ropasci</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="you">
          <p class="youText">You</p>
          <p class="youScore">23</p>
        </div>
        <div class="versus">
          against
        </div>
        <div class="umair">
          <p class="umairScore">18</p>
          <p class="umairText">Umair</p>
        </div>
      </header>
      <main class="main">
        <div class="rock">
          <img src="rock4.png" class="rockImage" />
        </div>
        <div class="paper">
          <img src="paper5.png" class="paperImage" />
        </div>
        <div class="scissors">
          <img src="scissors5.png" class="scissorsImage" />
        </div>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
